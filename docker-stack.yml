version: "3.7"

services:
  web:
    # Imagem construida localmente na VPS com: docker build -t lab_app:latest .
    image: lab_app:latest
    environment:
      - RAILS_ENV=production
      - RAILS_MAX_THREADS=5
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - DATABASE_URL=postgres://lab_user:TROQUE_SENHA_AQUI@db:5432/lab_app_production
      - WEBHOOK_API_TOKEN=TROQUE_TOKEN_AQUI
      - SECRET_KEY_BASE=TROQUE_SECRET_KEY_BASE_AQUI
      - SKIP_DB_PREPARE=true
    networks:
      - network_public
      - db-network
    volumes:
      - rails_storage:/rails/storage
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"

        # Router HTTP -> HTTPS redirect
        - "traefik.http.routers.labapp-http.rule=Host(`labapp.zaikohub.com.br`)"
        - "traefik.http.routers.labapp-http.entrypoints=web"
        - "traefik.http.routers.labapp-http.middlewares=redirect-https@docker"

        # Router HTTPS
        - "traefik.http.routers.labapp.rule=Host(`labapp.zaikohub.com.br`)"
        - "traefik.http.routers.labapp.entrypoints=websecure"
        - "traefik.http.routers.labapp.tls=true"
        - "traefik.http.routers.labapp.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.labapp.priority=10"

        # Service (porta do Rails)
        - "traefik.http.services.labapp.loadbalancer.server.port=3000"
        - "traefik.http.services.labapp.loadbalancer.server.scheme=http"

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=lab_user
      - POSTGRES_PASSWORD=TROQUE_SENHA_AQUI
      - POSTGRES_DB=lab_app_production
    networks:
      - db-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # Executa migrações durante deploy (roda 1x e termina)
  db-migrate:
    image: lab_app:latest
    command: ["bin/rails", "db:migrate", "db:seed"]
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgres://lab_user:TROQUE_SENHA_AQUI@db:5432/lab_app_production
      - SECRET_KEY_BASE=TROQUE_SECRET_KEY_BASE_AQUI
    networks:
      - db-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager

volumes:
  postgres_data:
  rails_storage:

networks:
  network_public:
    external: true
    name: network_public
  db-network:
    driver: overlay
    attachable: true
