version: '3.8'

services:
  web:
    image: ghcr.io/YOUR_GITHUB_USERNAME/lab_app:latest
    environment:
      - RAILS_ENV=production
      - RAILS_MAX_THREADS=5
      - RAILS_LOG_TO_STDOUT=true
      - DATABASE_URL=postgres://postgres_user:postgres_password@db:5432/lab_app_production
      - WEBHOOK_API_TOKEN=change_me_token_seguro
      - SECRET_KEY_BASE=change_me_secret_key_base
      - SKIP_DB_PREPARE=true
    networks:
      - traefik-public
      - db-network
    volumes:
      - rails-storage:/rails/storage
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        - "traefik.enable=true"
        # Substitua 'seulaboratorio.com.br' pelo seu domínio real
        - "traefik.http.routers.appvida.rule=Host(`vida.seulaboratorio.com.br`)"
        - "traefik.http.routers.appvida.entrypoints=websecure"
        - "traefik.http.routers.appvida.tls=true"
        - "traefik.http.routers.appvida.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.appvida.loadbalancer.server.port=3000"
        # Healthcheck integration with Traefik
        - "traefik.http.services.appvida.loadbalancer.healthcheck.path=/up"
        - "traefik.http.services.appvida.loadbalancer.healthcheck.interval=10s"
        - "traefik.http.services.appvida.loadbalancer.healthcheck.timeout=3s"

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres_user
      - POSTGRES_PASSWORD=postgres_password
      - POSTGRES_DB=lab_app_production
    networks:
      - db-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager # Geralmente managers têm volumes locais persistidos mais estáveis

  # Serviço temporário para rodar migrações ao realizar deploy
  db-migrate:
    image: ghcr.io/YOUR_GITHUB_USERNAME/lab_app:latest
    command: ["bin/rails", "db:migrate"]
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgres://postgres_user:postgres_password@db:5432/lab_app_production
    networks:
      - db-network
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

volumes:
  postgres_data:
  rails-storage:

networks:
  traefik-public:
    external: true
  db-network:
    driver: overlay
    attachable: true
